<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f0f1a">
    <title>Dasky Mini</title>
    <link rel="stylesheet" href="../css/estilo.css">
</head>
<body>
    <header>
        <span class="logo">Dasky Mini</span>
        <span class="estado" id="estado">
            <span class="estado-dot"></span>
            Desconectado
        </span>
    </header>

    <nav class="tabs">
        <button class="tab active" data-tab="galeria">Galería</button>
        <button class="tab" data-tab="mis-pantallas">Mis pantallas</button>
    </nav>

    <main>
        <!-- GALERÍA -->
        <section class="tab-content active" id="tab-galeria">
            <div class="galeria-grid" id="galeria-grid">
                <!-- Se llena con JS -->
            </div>
        </section>

        <!-- MIS PANTALLAS -->
        <section class="tab-content" id="tab-mis-pantallas">
            <div class="mis-pantallas-header">
                <p class="hint">Arrastra para reordenar. Pulsa para previsualizar.</p>
            </div>
            <div class="pantallas-lista" id="pantallas-lista">
                <!-- Se llena con JS -->
            </div>
            <button class="btn-guardar" id="btn-guardar">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                Guardar en dispositivo
            </button>
        </section>
    </main>

    <!-- PREVIEW MODAL -->
    <div class="modal-overlay" id="preview-modal">
        <div class="modal-preview">
            <button class="modal-close" id="preview-close">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
            <div class="preview-screen" id="preview-screen"></div>
            <p class="preview-nombre" id="preview-nombre"></p>
            <button class="btn-añadir" id="btn-añadir">Añadir a mis pantallas</button>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <script src="../js/app.js"></script>
    <script src="../js/ble.js"></script>
    <script src="../js/usb.js"></script>
</body>
</html>
